<?xml version="1.0" encoding="UTF-8"?>
<!--
  Playfield layout  —  coordinate origin at A1 (center of field)
  Field: 134.3 cm W × 89.3 cm H  →  ±67.15 x,  ±44.65 y
  Scale: 4.5 px / cm
  SVG formula:  svg_x = 392 + x*4.5,  svg_y = 291 - y*4.5

  Color ring (8 positions, clockwise from upper-left):
    (−35,+24) purple   (0,+24) black    (+35,+24) orange
    (+35,0)   red      (+35,−24) green  (0,−24) magenta
